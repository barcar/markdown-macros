# Publish to PyPI when a GitHub release is created
# 1. Create a PyPI API token: https://pypi.org/manage/account/token/
# 2. Add it under environment "pypi": Settings → Environments → pypi → Environment secrets → PYPI_API_TOKEN

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Version is canonical in pyproject.toml. Release tag must match (e.g. v0.3.2).
      - name: Verify release tag matches pyproject.toml version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          FILE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/.*"\([^"]*\)".*/\1/')
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: release tag is $TAG but pyproject.toml has version = \"$FILE_VERSION\""
            echo "Bump version in pyproject.toml (and CHANGELOG), commit, push, then create a release with tag v$FILE_VERSION"
            exit 1
          fi
          echo "Building version $FILE_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
