# Dependabot: open PRs to update dependencies
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Python (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
